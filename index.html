  html, body {

  .logo-badge {

    display: flex; align-items: center; justify-content: center;
    font-size: 52px;

  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 0.12em;

    margin: 0 auto 28px; text-align: left;
    font-size: 13px; line-height: 1.6; color: var(--purple-dark);

    color: white; border: none; padding: 16px 40px;
    font-size: 16px; font-weight: 600; border-radius: 14px; cursor: pointer;

  /* === PROGRESS === */
  .progress-wrap { margin-bottom: 28px; }
  .progress-bar { height: 6px; background: var(--purple-100); border-radius: 999px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--purple), var(--purple-light));
    border-radius: 999px; transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1); width: 0%;
  }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 8px; }

    background: white; border: 1px solid var(--line); border-radius: 24px;

    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }

  .option:hover { border-color: var(--purple-200); background: var(--purple-50); transform: translateX(2px); }

    width: 22px; height: 22px; border-radius: 6px;
    border: 1.5px solid var(--purple-200); flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    background: white; transition: all 0.2s;

  .option.selected .check { background: var(--purple); border-color: var(--purple); }

    content: ""; width: 10px; height: 6px;
    border-left: 2px solid white; border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }

    content: ""; width: 8px; height: 8px; border-radius: 50%;

  .track-label {
    font-size: 12px; font-weight: 700; opacity: 0.85;

  .track-name { font-size: 34px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 10px; position: relative; }
  .track-desc { font-size: 15px; line-height: 1.55; opacity: 0.95; position: relative; max-width: 460px; margin: 0 auto; }

  .rings { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .ring-card {
    background: white; border: 1px solid var(--line); border-radius: 20px;

  .ring-svg { width: 110px; height: 110px; transform: rotate(-90deg); margin: 0 auto 10px; display: block; }
  .ring-track { fill: none; stroke: var(--purple-100); stroke-width: 8; }
  .ring-fill {
    fill: none; stroke: var(--purple); stroke-width: 8; stroke-linecap: round;
    stroke-dasharray: 188; stroke-dashoffset: 188;
    transition: stroke-dashoffset 1.6s cubic-bezier(0.22, 1, 0.36, 1);

  .ring-fill.env { stroke: var(--purple-light); }
  .ring-label {
    font-size: 12px; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;

  .ring-value { font-size: 30px; font-weight: 800; color: var(--purple); letter-spacing: -0.02em; }
  .ring-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .rec-section {
    background: white; border: 1px solid var(--line); border-radius: 20px;
    padding: 22px 24px; margin-bottom: 14px; box-shadow: var(--shadow-sm);

    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;

  .rec-item {
    display: flex; align-items: flex-start; gap: 10px;

  .rec-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  .ohana-link {

    border: 1px solid var(--purple-200); border-radius: 8px;

    text-decoration: none; transition: all 0.15s;
  }
  .ohana-link:hover { background: var(--purple-100); }

  .repeat-btn {
    width: 100%; background: white; color: var(--purple);

    cursor: pointer; font-size: 15px; font-weight: 600; font-family: inherit;
    transition: all 0.2s; margin-top: 12px;
  }
  .repeat-btn:hover { background: var(--purple); color: white; }

  #confetti-canvas {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none; z-index: 1000;
  }

  @media (max-width: 540px) {
    .welcome h1 { font-size: 32px; }
    .question-card { padding: 24px 20px; }
    .q-title { font-size: 19px; }
    .rings { grid-template-columns: 1fr; }
    .track-name { font-size: 28px; }
  }
</style>
</head>

  { match: 'tren', msg: 'Eso se nota y es valioso. Tu energía con AI es exactamente lo que el equipo necesita. El siguiente paso es canalizarla para que otros también suban al tren contigo.' },

/* ======================================================================
   STATE
   ====================================================================== */
let currentQ = 0;
let screen = 'welcome';
const answers = {};

/* ======================================================================
   SCORING
   ====================================================================== */
function questionScore(q) {
  const sel = answers[q.id] || [];
  if (!q.scores || sel.length === 0) return 0;
  if (q.type === 'radio') return q.scores[sel[0]] || 0;
  return sel.reduce((s, i) => s + (q.scores[i] || 0), 0);
}
function questionMax(q) {
  if (!q.scores) return 0;
  if (q.type === 'radio') return Math.max(...q.scores);
  return q.scores.reduce((s, v) => s + v, 0);
}
function computeAdoption() {
  let total = 0, max = 0;
  SCORED.forEach(id => {
    const q = QUESTIONS.find(x => x.id === id);
    total += questionScore(q);
    max += questionMax(q);
  });
  return Math.round((total / max) * 100);
}
function computeHabitos() {
  const freq = QUESTIONS.find(q => q.id === 'frecuencia');
  const mult = QUESTIONS.find(q => q.id === 'multiplicar');
  const t = questionScore(freq) + questionScore(mult);
  const m = questionMax(freq) + questionMax(mult);
  return Math.round((t / m) * 100);
}
function getTrack(score) {
  if (score <= 40) return TRACKS[1];
  if (score <= 70) return TRACKS[2];
  return TRACKS[3];
}
function answerText(qId) {
  const q = QUESTIONS.find(x => x.id === qId);
  const sel = answers[qId] || [];
  return sel.map(i => q.options[i].text).join(' | ');
}

/* ======================================================================
   SHEETS
   ====================================================================== */
function sendToSheets(payload) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'TU_URL_AQUI') return;
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

/* ======================================================================
   RENDER
   ====================================================================== */
const root = document.getElementById('root');

function render() {
  if (screen === 'welcome') renderWelcome();
  else if (screen === 'quiz') renderQuiz();
  else renderResults();
  window.scrollTo(0, 0);
}

    <button class="option ${q.type} ${sel.includes(i) ? 'selected' : ''}" onclick="selectOption(${i})">
      <span class="check"></span>
      <span class="opt-text">${o.text}${o.sub ? `<span class="opt-sub">${o.sub}</span>` : ''}</span>
    </button>

  const isLast = currentQ === total - 1;
  root.innerHTML = `
    <section class="stage">

      </div>

  setTimeout(() => animateRing('ring-adopt', score, 'adopt-value'), 200);

/* ======================================================================
   INTERACTIONS
   ====================================================================== */
function startQuiz() { screen = 'quiz'; currentQ = 0; render(); }

function selectOption(idx) {
  const q = QUESTIONS[currentQ];
  const sel = answers[q.id] || [];
  if (q.type === 'radio') {
    answers[q.id] = [idx];
  } else {
    const opt = q.options[idx];
    if (opt.exclusive) {
      answers[q.id] = sel.includes(idx) ? [] : [idx];
    } else {
      let next = sel.filter(i => !q.options[i].exclusive);
      if (next.includes(idx)) next = next.filter(i => i !== idx);
      else next.push(idx);
      answers[q.id] = next;
    }
  }
  render();
}

function goNext() {
  if ((answers[QUESTIONS[currentQ].id] || []).length === 0) return;
  if (currentQ < QUESTIONS.length - 1) { currentQ++; render(); }
  else { screen = 'results'; render(); }
}
function goBack() {
  if (currentQ > 0) { currentQ--; render(); }
}
function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  currentQ = 0;
  screen = 'welcome';
  render();
}

/* ======================================================================
   FX
   ====================================================================== */
function animateRing(circleId, pct, valueId) {
  const C = 188;
  const ring = document.getElementById(circleId);
  if (ring) ring.style.strokeDashoffset = C - (C * pct) / 100;
  const valEl = document.getElementById(valueId);
  if (!valEl) return;
  const start = performance.now();
  const dur = 1500;
  function tick(now) {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    valEl.textContent = `${Math.round(eased * pct)}%`;
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function fireConfetti(count) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(dpr, dpr);
  const COLORS = ['#820AD1', '#B061E5', '#34C759', '#2E7CF6', '#FFD86B', '#FF6B9D'];
  const pieces = [];
  for (let i = 0; i < count; i++) {
    pieces.push({
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
      y: window.innerHeight / 3,
      vx: (Math.random() - 0.5) * 8,
      vy: -Math.random() * 14 - 4,
      g: 0.35 + Math.random() * 0.15,
      size: 6 + Math.random() * 8,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.3,
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
      life: 1
    });
  }
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life -= 0.005;
      if (p.y < window.innerHeight + 40 && p.life > 0) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      else { ctx.beginPath(); ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
    }
    if (alive) requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  frame();
}

render();
