<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diagnóstico de AI · Ops &amp; Defense Colombia</title>
<style>
  :root {
    --nu-purple: #820AD1;
    --nu-purple-dark: #6A0AAB;
    --nu-purple-deep: #2D0A4E;
    --nu-lilac: #EFE2FB;
    --nu-lilac-soft: #F8F3FC;
    --ink: #111111;
    --ink-2: #58565B;
    --ink-3: #97939C;
    --line: #E9E5EE;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--white);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    background: var(--nu-purple);
    padding: 18px 24px;
  }
  .topbar-inner {
    max-width: 640px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nu-mark {
    color: #fff; font-weight: 800; font-size: 22px; letter-spacing: -0.02em;
  }
  .topbar-tag {
    color: rgba(255,255,255,0.85); font-size: 12.5px; font-weight: 500;
    letter-spacing: 0.04em;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 24px 88px;
  }

  .stage { animation: rise 0.35s ease both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hidden { display: none !important; }

  /* ── Intro ── */
  .kicker {
    display: inline-block;
    background: var(--nu-lilac); color: var(--nu-purple-dark);
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 7px 14px; border-radius: 999px; margin-bottom: 22px;
  }
  h1 {
    font-size: 38px; font-weight: 800; line-height: 1.12;
    letter-spacing: -0.025em; margin-bottom: 16px; color: var(--ink);
  }
  h1 .pop { color: var(--nu-purple); }
  .lede { font-size: 17px; color: var(--ink-2); margin-bottom: 26px; max-width: 520px; }
  .meta-line { font-size: 13.5px; color: var(--ink-3); margin-bottom: 30px; }
  .meta-line b { color: var(--nu-purple); font-weight: 600; }

  .note {
    background: var(--nu-lilac-soft);
    border: 1px solid var(--nu-lilac);
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 14.5px; color: var(--ink-2);
    margin-bottom: 30px;
  }
  .note b { color: var(--nu-purple-dark); }

  label.field-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--ink); margin-bottom: 8px;
  }
  input[type="email"] {
    width: 100%;
    font-family: inherit; font-size: 16px; color: var(--ink);
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="email"]:focus {
    border-color: var(--nu-purple);
    box-shadow: 0 0 0 3px var(--nu-lilac);
  }
  input::placeholder { color: var(--ink-3); }
  .field-error { font-size: 13px; color: #C7232E; margin-top: 8px; display: none; }

  /* ── Buttons (Nu pill style) ── */
  .btn {
    font-family: inherit;
    font-size: 15.5px; font-weight: 700;
    background: var(--nu-purple); color: #fff;
    border: none; border-radius: 999px;
    padding: 15px 36px; cursor: pointer;
    transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { background: var(--nu-purple-dark); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(130,10,209,0.25); }
  .btn:disabled { background: var(--nu-lilac); color: #C2A3DC; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-ghost {
    background: transparent; color: var(--nu-purple);
    border: 1.5px solid var(--nu-lilac);
  }
  .btn-ghost:hover { background: var(--nu-lilac-soft); box-shadow: none; }
  .btn-ghost:disabled { opacity: 0.35; background: transparent; color: var(--nu-purple); cursor: not-allowed; }

  /* ── Progress ── */
  .progress { margin-bottom: 30px; }
  .progress-track {
    height: 8px; background: var(--nu-lilac-soft);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0;
    background: var(--nu-purple);
    border-radius: 999px;
    transition: width 0.35s ease;
  }
  .progress-text { font-size: 13px; color: var(--ink-3); margin-top: 10px; font-weight: 500; }
  .progress-text b { color: var(--nu-purple); }

  /* ── Question ── */
  .q-title { font-size: 25px; font-weight: 800; line-height: 1.22; letter-spacing: -0.015em; margin-bottom: 8px; }
  .q-help { font-size: 14.5px; color: var(--ink-3); margin-bottom: 24px; }

  .opts { display: flex; flex-direction: column; gap: 12px; }
  .opt {
    display: flex; align-items: flex-start; gap: 14px;
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    width: 100%; text-align: left; font-family: inherit;
  }
  .opt:hover { border-color: var(--nu-purple); background: var(--nu-lilac-soft); }
  .opt.selected {
    border-color: var(--nu-purple);
    background: var(--nu-lilac-soft);
    box-shadow: 0 0 0 3px var(--nu-lilac);
  }
  .opt-check {
    width: 22px; height: 22px; flex-shrink: 0; margin-top: 1px;
    border: 2px solid var(--line); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: #fff;
  }
  .opt.box .opt-check { border-radius: 7px; }
  .opt.selected .opt-check { background: var(--nu-purple); border-color: var(--nu-purple); }
  .opt.selected .opt-check::after {
    content: ""; width: 10px; height: 6px;
    border-left: 2.5px solid #fff; border-bottom: 2.5px solid #fff;
    transform: rotate(-45deg) translate(0.5px, -1px);
  }
  .opt-body { font-size: 15.5px; font-weight: 600; color: var(--ink); line-height: 1.35; }
  .opt-sub { display: block; font-size: 13px; font-weight: 400; color: var(--ink-3); margin-top: 2px; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 34px; gap: 12px; }

  /* ── Thanks ── */
  .thanks { text-align: center; padding-top: 26px; }
  .thanks-icon {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--nu-purple);
    color: #fff; font-size: 42px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 30px;
    box-shadow: 0 16px 40px rgba(130,10,209,0.3);
  }
  .thanks h2 { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 16px; }
  .thanks h2 .pop { color: var(--nu-purple); }
  .thanks p { font-size: 16.5px; color: var(--ink-2); max-width: 460px; margin: 0 auto 12px; }
  .thanks .signature {
    margin-top: 30px; font-size: 15px; color: var(--nu-purple-dark); font-weight: 700;
  }
  .thanks .saved-warn {
    display: inline-block; margin-top: 26px;
    background: #FFF4E5; color: #8A5300;
    font-size: 13px; border-radius: 12px; padding: 10px 16px;
  }

  footer {
    max-width: 640px; margin: 0 auto; padding: 0 24px 40px;
    font-size: 12.5px; color: var(--ink-3);
  }

  @media (max-width: 540px) {
    h1 { font-size: 30px; }
    .q-title { font-size: 21px; }
    .thanks h2 { font-size: 27px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span class="nu-mark">nu</span>
    <span class="topbar-tag">Ohana · Ops &amp; Defense · Colombia</span>
  </div>
</div>

<div class="wrap">
  <main id="root"></main>
</div>

<footer id="footer">
  Programa Ohana · Ops &amp; Defense Colombia — ¿Dudas? Escríbenos por Slack.
</footer>

<script>
/* ──────────────────────────────────────────────────────────────────────
   CONFIG · Google Sheets (Apps Script)
   Pega aquí la URL del Web App. Cada envío guarda una fila con el
   correo, todas las respuestas, el score y el track calculado.
   ────────────────────────────────────────────────────────────────────── */
const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/nubank.com.br/s/AKfycbxQzxwaDIFrbtZpqn7ki3qfw3OhS6zJD1-MmjNSz24Jz39JCB569yHv57_-MZYWX_Rf/exec';

/* ──────────────────────────────────────────────────────────────────────
   PREGUNTAS
   ────────────────────────────────────────────────────────────────────── */
const QUESTIONS = [
  {
    id: 'role',
    title: '¿Cuál es tu rol en Ops & Defense?',
    help: 'Si tienes un rol híbrido, elige el que mejor te describe.',
    type: 'radio',
    options: [
      { text: 'Analista de Operaciones', sub: 'Procesos operativos, casos, back office' },
      { text: 'Analista de Fraude / Defense', sub: 'Prevención, detección, investigación' },
      { text: 'Ingeniero / Developer', sub: 'Desarrollo, automatización, herramientas internas' },
      { text: 'Business Analyst / Data', sub: 'Métricas, reportes, análisis de datos' },
      { text: 'Líder / Manager', sub: 'Gestión de equipo, estrategia, priorización' },
      { text: 'Otro rol de Ops & Defense' },
    ]
  },
  {
    id: 'stack',
    title: '¿Qué herramientas de AI tienes instaladas y funcionando?',
    help: 'Marca todo lo que ya tienes operativo, no lo que planeas instalar.',
    type: 'checkbox',
    options: [
      { text: 'Claude', sub: 'Desktop o web, con tu cuenta de Nubank' },
      { text: 'Cursor', sub: 'Instalado y con acceso a código o proyectos' },
      { text: 'Glean', sub: 'Para buscar conocimiento interno' },
      { text: 'Conectores / MCPs', sub: 'Claude o Cursor conectados a otras herramientas' },
      { text: 'Ninguna todavía', exclusive: true },
    ],
    scores: [1, 1, 1, 1, 0]
  },
  {
    id: 'frecuencia',
    title: '¿Con qué frecuencia usaste AI en tu trabajo esta semana?',
    help: 'Piensa en Claude, Cursor, Glean o cualquier otra herramienta.',
    type: 'radio',
    options: [
      { text: 'Nunca o casi nunca' },
      { text: 'Una o dos veces', sub: 'Algo puntual esta semana' },
      { text: 'Varias veces', sub: 'Algunos días, para tareas específicas' },
      { text: 'Todos los días', sub: 'Parte de mi rutina diaria' },
      { text: 'Múltiples veces al día', sub: 'Integrada en casi todo lo que hago' },
    ],
    scores: [0, 1, 2, 3, 4]
  },
  {
    id: 'profundidad',
    title: 'Cuando usas AI, ¿cómo describes lo que necesitas?',
    help: 'Como lo haces hoy, no como crees que deberías hacerlo.',
    type: 'radio',
    options: [
      { text: 'Le escribo algo corto y veo qué sale' },
      { text: 'Doy contexto del problema antes de pedir' },
      { text: 'Defino rol, contexto, formato y restricciones' },
      { text: 'Tengo prompts guardados y reutilizables', sub: 'Probados, refinados, los reutilizo' },
    ],
    scores: [0, 1, 3, 4]
  },
  {
    id: 'construido',
    title: '¿Qué has generado o construido con AI en tu trabajo?',
    help: 'Marca todo lo que aplique. No importa el tamaño.',
    type: 'checkbox',
    options: [
      { text: 'Documentos, resúmenes o presentaciones', sub: 'SOPs, reportes de casos, comunicaciones' },
      { text: 'Análisis de datos o dashboards', sub: 'Métricas de operación, tendencias de fraude' },
      { text: 'Código o scripts', sub: 'Queries, automatizaciones simples' },
      { text: 'Automatizaciones o agentes activos', sub: 'Flujos que corren solos o casi solos' },
      { text: 'Nada todavía', exclusive: true },
    ],
    scores: [1, 1, 2, 3, 0]
  },
  {
    id: 'impacto',
    title: '¿Algo concreto que hiciste mejor o más rápido con AI en el último mes?',
    type: 'radio',
    options: [
      { text: 'No, no lo he notado o medido' },
      { text: 'Sí, ahorré tiempo en tareas repetitivas' },
      { text: 'Sí, mejoré la calidad de un entregable o decisión' },
      { text: 'Sí, resolví algo que sin AI no habría podido o habría tardado mucho más' },
    ],
    scores: [0, 1, 2, 4]
  },
  {
    id: 'multiplicar',
    title: '¿Has compartido con el equipo algo que aprendiste o construiste con AI?',
    help: 'Un prompt, un flujo, una forma de usarla, un resultado.',
    type: 'radio',
    options: [
      { text: 'No he compartido nada' },
      { text: 'Sí, informalmente le conté a alguien' },
      { text: 'Sí, compartí algo concreto que otros usan' },
      { text: 'Sí, lideré o propuse una práctica de equipo' },
    ],
    scores: [0, 1, 2, 4]
  },
  {
    id: 'barrera',
    title: '¿Cuál es tu mayor obstáculo para usar más AI con impacto real?',
    help: 'Una sola respuesta, la que más resuene contigo.',
    type: 'radio',
    options: [
      { text: 'No sé por dónde empezar o qué pedirle' },
      { text: 'No encuentro casos de uso claros para mi rol' },
      { text: 'Le tengo desconfianza al output que genera' },
      { text: 'El contexto de datos / seguridad me limita' },
      { text: 'No tengo tiempo para aprender', sub: 'La operación del día a día no deja espacio' },
      { text: 'Ya la uso bastante, mi barrera es otra' },
    ]
  },
  {
    id: 'emocion',
    title: 'Para cerrar: ¿cómo te sientes con el momento de AI que vive Nubank?',
    help: 'No hay respuesta correcta. Es solo para entenderte mejor.',
    type: 'radio',
    options: [
      { text: 'Estoy en el tren y disfrutando el viaje' },
      { text: 'Voy corriendo para alcanzarlo' },
      { text: 'Lo veo pasar y no sé por dónde subirme' },
      { text: 'Me genera más ansiedad que emoción' },
      { text: 'No sé muy bien cómo me siento todavía' },
    ]
  },
];

const SCORED = ['stack', 'frecuencia', 'profundidad', 'construido', 'impacto', 'multiplicar'];

/* ──────────────────────────────────────────────────────────────────────
   STATE
   ────────────────────────────────────────────────────────────────────── */
let screen = 'intro';   // intro | quiz | thanks
let currentQ = 0;
let correo = '';
let sendStatus = null;
const answers = {};     // id -> array de índices

/* ──────────────────────────────────────────────────────────────────────
   SCORING (no se muestra al usuario; va al sheet)
   ────────────────────────────────────────────────────────────────────── */
function questionScore(q) {
  if (!q.scores) return 0;
  return (answers[q.id] || []).reduce((s, i) => s + (q.scores[i] || 0), 0);
}
function questionMax(q) {
  if (!q.scores) return 0;
  if (q.type === 'radio') return Math.max(...q.scores);
  return q.scores.reduce((s, v) => s + v, 0);
}
function computeAdoption() {
  let t = 0, m = 0;
  SCORED.forEach(id => {
    const q = QUESTIONS.find(x => x.id === id);
    t += questionScore(q); m += questionMax(q);
  });
  return Math.round((t / m) * 100);
}
function computeHabitos() {
  const a = QUESTIONS.find(q => q.id === 'frecuencia');
  const b = QUESTIONS.find(q => q.id === 'multiplicar');
  return Math.round(((questionScore(a) + questionScore(b)) / (questionMax(a) + questionMax(b))) * 100);
}
function trackName(score) {
  if (score <= 40) return 'Track 1 · Explorador';
  if (score <= 70) return 'Track 2 · Practicante';
  return 'Track 3 · Multiplicador';
}
function answerText(qId) {
  const q = QUESTIONS.find(x => x.id === qId);
  return (answers[qId] || []).map(i => q.options[i].text).join(' | ');
}

/* ──────────────────────────────────────────────────────────────────────
   SHEETS
   ────────────────────────────────────────────────────────────────────── */
function sendToSheets(payload) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'TU_URL_AQUI') return Promise.resolve('skipped');
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(() => 'ok').catch(() => 'fail');
}

/* ──────────────────────────────────────────────────────────────────────
   RENDER
   ────────────────────────────────────────────────────────────────────── */
const root = document.getElementById('root');

function render() {
  if (screen === 'intro') renderIntro();
  else if (screen === 'quiz') renderQuiz();
  else renderThanks();
  window.scrollTo(0, 0);
}

function renderIntro() {
  root.innerHTML = `
    <section class="stage">
      <span class="kicker">Programa Ohana</span>
      <h1>Cuéntanos cómo vas <span class="pop">con la AI</span></h1>
      <p class="lede">Queremos saber dónde está cada persona de Ops &amp; Defense hoy: qué herramientas usa, con qué profundidad y qué le está estorbando. Con eso armamos el plan de acompañamiento de cada uno.</p>
      <p class="meta-line"><b>9 preguntas</b> · ~3 minutos · Tus respuestas quedan registradas con tu correo</p>
      <div class="note">
        <b>Antes de empezar:</b> no hay respuestas buenas ni malas, y nadie va a ser evaluado por esto. Responde según donde estás <em>hoy</em>, no donde quisieras estar.
      </div>
      <div style="margin-bottom:28px;">
        <label class="field-label" for="correo">Tu correo Nubank</label>
        <input type="email" id="correo" placeholder="tu.nombre@nubank.com.co" autocomplete="email" value="${correo}" />
        <p class="field-error" id="correo-error">Ingresa tu correo Nubank para continuar.</p>
      </div>
      <button class="btn" onclick="startQuiz()">Empezar →</button>
    </section>
  `;
  const input = document.getElementById('correo');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') startQuiz(); });
}

function renderQuiz() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  const sel = answers[q.id] || [];
  const pct = Math.round((currentQ / total) * 100);
  const isLast = currentQ === total - 1;

  const opts = q.options.map((o, i) => `
    <button class="opt ${q.type === 'checkbox' ? 'box' : ''} ${sel.includes(i) ? 'selected' : ''}" onclick="selectOption(${i})">
      <span class="opt-check"></span>
      <span class="opt-body">${o.text}${o.sub ? `<span class="opt-sub">${o.sub}</span>` : ''}</span>
    </button>
  `).join('');

  root.innerHTML = `
    <section class="stage">
      <div class="progress">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <p class="progress-text">Pregunta <b>${currentQ + 1}</b> de ${total}</p>
      </div>
      <h2 class="q-title">${q.title}</h2>
      ${q.help ? `<p class="q-help">${q.help}</p>` : ''}
      <div class="opts">${opts}</div>
      <div class="nav">
        <button class="btn btn-ghost" onclick="goBack()" ${currentQ === 0 ? 'disabled' : ''}>← Atrás</button>
        <button class="btn" id="btn-next" onclick="goNext()" ${sel.length === 0 ? 'disabled' : ''}>${isLast ? 'Enviar respuestas' : 'Siguiente →'}</button>
      </div>
    </section>
  `;
}

function renderThanks() {
  let warn = '';
  if (sendStatus === 'fail') {
    warn = '<span class="saved-warn">No pudimos registrar tus respuestas automáticamente — avísanos por Slack para guardarlas manualmente.</span>';
  }
  root.innerHTML = `
    <section class="stage thanks">
      <div class="thanks-icon">💜</div>
      <h2>¡Gracias por <span class="pop">responder</span>!</h2>
      <p>Tus respuestas ya quedaron registradas. Con ellas vamos a armar un plan de acompañamiento a tu medida, para que la AI te quite trabajo y no te lo sume.</p>
      <p><strong>Pronto estaremos en contacto contigo.</strong></p>
      <p class="signature">— El equipo Ohana de Ops &amp; Defense 💜</p>
      ${warn}
    </section>
  `;
}

/* ──────────────────────────────────────────────────────────────────────
   INTERACTIONS
   ────────────────────────────────────────────────────────────────────── */
function startQuiz() {
  const input = document.getElementById('correo');
  const err = document.getElementById('correo-error');
  const value = input.value.trim().toLowerCase();
  if (!value || !value.includes('@')) {
    err.style.display = 'block';
    input.focus();
    return;
  }
  correo = value;
  screen = 'quiz';
  currentQ = 0;
  render();
}

function selectOption(idx) {
  const q = QUESTIONS[currentQ];
  const sel = answers[q.id] || [];
  if (q.type === 'radio') {
    answers[q.id] = [idx];
  } else {
    const opt = q.options[idx];
    if (opt.exclusive) {
      answers[q.id] = sel.includes(idx) ? [] : [idx];
    } else {
      let next = sel.filter(i => !q.options[i].exclusive);
      if (next.includes(idx)) next = next.filter(i => i !== idx);
      else next.push(idx);
      answers[q.id] = next;
    }
  }
  render();
}

function goBack() {
  if (currentQ > 0) { currentQ--; render(); }
}

function goNext() {
  if ((answers[QUESTIONS[currentQ].id] || []).length === 0) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    render();
    return;
  }
  submitAll();
}

function submitAll() {
  const btn = document.getElementById('btn-next');
  btn.disabled = true;
  btn.textContent = 'Enviando…';

  const score = computeAdoption();
  const payload = {
    fecha: new Date().toISOString(),
    equipo: 'Ops & Defense Colombia',
    correo: correo,
    rol: answerText('role'),
    stack: answerText('stack'),
    frecuencia: answerText('frecuencia'),
    profundidad: answerText('profundidad'),
    construido: answerText('construido'),
    impacto: answerText('impacto'),
    multiplicar: answerText('multiplicar'),
    barrera: answerText('barrera'),
    emocion: answerText('emocion'),
    score: score,
    habitos: computeHabitos(),
    track: trackName(score)
  };

  sendToSheets(payload).then(status => {
    sendStatus = status;
    screen = 'thanks';
    render();
  });
}

render();
</script>
